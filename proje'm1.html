<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yağız Karakoç | Dijital Kart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS Kısmı - Tasarımın Ruhu */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        .light-mode {
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-color: #1e293b;
            --accent-color: #0284c7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 400px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            margin-bottom: 20px;
        }

        .btn-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
        }

        .skill-badge {
            background: var(--accent-color);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin: 3px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <button class="btn-toggle" onclick="temaDegistir()">Mod Değiştir</button>

    <div class="profile-card">
        <img src="https://via.placeholder.com/120" alt="Profil" class="profile-img">
        <h2 class="fw-bold">Yağız Karakoç</h2>
        <p class="text-secondary">Geleceğin Yazılım Mühendisi</p>
        
        <div class="my-4">
            <span class="skill-badge">Java</span>
            <span class="skill-badge">C#</span>
            <span class="skill-badge">HTML/CSS</span>
            <span class="skill-badge">Bootstrap</span>
        </div>
